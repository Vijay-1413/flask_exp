<!DOCTYPE html>
<html>
<head>
    <title>Author Details</title>
</head>
<body>

<h2>Author Details</h2>

<a href="{{ url_for('dashboard') }}">Dashboard</a> |
<a href="{{ url_for('inventory') }}">Inventory</a> |
<a href="{{ url_for('authors') }}">Author Details</a> |
<a href="{{ url_for('logout') }}">Logout</a>

<hr>

<a href="{{ url_for('add_author') }}">Add Author</a>

<br><br>

<table border="1" cellpadding="10">

<tr>
    <th>Author Name</th>
    <th>Age</th>
    <th>Address</th>
    <th>Author ID</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

{% for author in authors %}

<tr>

<td>{{ author["author"] }}</td>
<td>{{ author["author_age"] }}</td>
<td>{{ author["author_address"] }}</td>
<td>{{ author["author_id"] }}</td>

<td>
<a href="{{ url_for('edit_author', id=author['id']) }}">Edit</a>
</td>

<td>
<a href="{{ url_for('delete_author', id=author['id']) }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
