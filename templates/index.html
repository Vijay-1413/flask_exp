<!DOCTYPE html>
<head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:lightgray;
}

.login-box{
    width:350px;
    border:2px solid black;
    background:white;
}

.login-box h2{
    text-align:center;
    padding:15px;
}

.login-box hr{
    border:none;
    border-top:2px solid black;
    width:100%;
    margin:0;
}

.form{
    padding:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid black;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <hr>

    <div class="form">
        <label>Username</label>
        <input type="text" placeholder="Enter Username">

        <label>Password</label>
        <input type="password" placeholder="Enter Password">
<br><br><br>
    </div>

    <hr>
<br><br>
</div>

</body>
</html>
