<!DOCTYPE html>
<html>

<head>
    <title>Input Page</title>
</head>

<body>

<h1>Student Form</h1>

<form action="/save" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required>

    <br><br>

    <label>Age:</label>
    <input type="number" name="age" required>

    <br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
