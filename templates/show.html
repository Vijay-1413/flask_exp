<!DOCTYPE html>
<html>
<head>
    <title>Student Records</title>

    <style>

        table{
            border-collapse: collapse;
            width:60%;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        th{
            background-color:lightgray;
        }

    </style>

</head>

<body>

<h2>Student Records</h2>

<table>

<tr>
    <th>S.no</th>
    <th>Name</th>
    <th>Age</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
